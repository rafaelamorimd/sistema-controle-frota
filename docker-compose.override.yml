# Override para desenvolvimento local
# Ativado automaticamente pelo docker compose
services:
  backend:
    volumes:
      - ./backend:/app
      - /app/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      FRANKENPHP_CONFIG: ""

  # Vite em modo dev: alteracoes no ./frontend refletem sem rebuild da imagem
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      API_PROXY_TARGET: http://backend:8000
      VITE_HMR_CLIENT_PORT: ${FRONTEND_PORT:-3000}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    command:
      - sh
      - -c
      - test -d node_modules/react || npm ci; npm run dev -- --host 0.0.0.0 --port 5173

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
