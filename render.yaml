##
## Render Blueprint - Sistema Gefther
## Documentacao: https://render.com/docs/blueprint-spec
##
## ANTES DE FAZER DEPLOY:
##   1. Suba o repositorio no GitHub
##   2. No Render, clique em "New" > "Blueprint"
##   3. Conecte o repositorio e selecione este arquivo
##   4. Ajuste os valores marcados com "ALTERAR" abaixo
##

version: "1"

services:

  # ===========================================================
  # BACKEND - Laravel 12 + FrankenPHP
  # ===========================================================
  - type: web
    name: gefther-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: starter           # starter ~$7/mes | standard ~$25/mes

    healthCheckPath: /up

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        generateValue: true   # Render gera automaticamente

      # URLs - ALTERAR apos o primeiro deploy com os dominios reais
      - key: APP_URL
        value: https://gefther-backend.onrender.com

      - key: FRONTEND_URL
        value: https://gefther-frontend.onrender.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://gefther-frontend.onrender.com

      # Banco de dados - preenchido automaticamente pelo Render
      - key: DB_CONNECTION
        value: pgsql

      - key: DB_HOST
        fromDatabase:
          name: gefther-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: gefther-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: gefther-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: gefther-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: gefther-db
          property: password

      # Redis - preenchido automaticamente pelo Render
      - key: REDIS_CLIENT
        value: phpredis

      - key: REDIS_HOST
        fromService:
          type: redis
          name: gefther-redis
          property: host

      - key: REDIS_PORT
        fromService:
          type: redis
          name: gefther-redis
          property: port

      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: gefther-redis
          property: password

      - key: CACHE_STORE
        value: redis

      - key: SESSION_DRIVER
        value: redis

      - key: QUEUE_CONNECTION
        value: redis

      # Logs para stdout (visivel no painel do Render)
      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: error

      # Storage S3-compatible (preencher manualmente no painel do Render)
      - key: FILESYSTEM_DISK
        value: local          # trocar para "s3" ao configurar storage externo

      - key: AWS_ACCESS_KEY_ID
        value: ""

      - key: AWS_SECRET_ACCESS_KEY
        value: ""

      - key: AWS_DEFAULT_REGION
        value: auto

      - key: AWS_BUCKET
        value: ""

      - key: AWS_ENDPOINT
        value: ""

      - key: MAIL_MAILER
        value: log             # trocar para smtp/ses em producao

  # ===========================================================
  # FRONTEND - React + Vite (Static Site - GRATUITO)
  # ===========================================================
  - type: web
    name: gefther-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # URL do backend no Render - ALTERAR apos o primeiro deploy
      - key: VITE_API_URL
        value: https://gefther-backend.onrender.com

  # ===========================================================
  # BANCO DE DADOS - PostgreSQL gerenciado pelo Render
  # Plano free: disponivel por 90 dias (depois ~$7/mes)
  # ===========================================================
  - type: pserv
    name: gefther-db
    plan: free
    databaseName: gefther
    user: gefther

  # ===========================================================
  # REDIS - Cache, Sessions e Queues
  # Plano free foi descontinuado; minimo starter ~$10/mes
  # Alternativa gratuita: https://upstash.com (conectar manualmente)
  # ===========================================================
  - type: redis
    name: gefther-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []           # apenas servicos internos do Render
