##
## Render Blueprint - Sistema Gefther (Plano Gratuito)
##
## CUSTOS:
##   - Backend:   GRATIS (dorme apos 15min sem uso; acorda em ~30s)
##   - Frontend:  GRATIS (Static Site)
##   - Postgres:  GRATIS por 90 dias (depois $7/mes ou migrar para outro provider)
##   - Redis:     Removido do plano free. Cache/Sessao/Queue via banco de dados.
##
## ANTES DO DEPLOY:
##   1. Suba o repo no GitHub
##   2. Render > "New" > "Blueprint" > conecte o repo
##   3. Apos o 1o deploy, atualize APP_URL, FRONTEND_URL e CORS_ALLOWED_ORIGINS
##      com as URLs reais geradas pelo Render
##

version: "1"

services:
  # ===========================================================
  # BACKEND - Laravel 12 + FrankenPHP
  # ===========================================================
  - type: web
    name: gefther-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /up

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        generateValue: true

      # ALTERAR apos o primeiro deploy com as URLs reais
      - key: APP_URL
        value: https://gefther-backend.onrender.com

      - key: FRONTEND_URL
        value: https://gefther-frontend.onrender.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://gefther-frontend.onrender.com

      # Banco de dados
      - key: DB_CONNECTION
        value: pgsql

      - key: DB_HOST
        fromDatabase:
          name: gefther-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: gefther-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: gefther-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: gefther-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: gefther-db
          property: password

      # Sem Redis: tudo via banco de dados
      - key: CACHE_STORE
        value: database

      - key: SESSION_DRIVER
        value: database

      - key: QUEUE_CONNECTION
        value: database

      - key: REDIS_HOST
        value: ""

      - key: REDIS_PASSWORD
        value: ""

      - key: REDIS_PORT
        value: "6379"

      # Logs
      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: error

      # Storage (local no free tier; configurar S3 para persistencia)
      - key: FILESYSTEM_DISK
        value: local

      - key: MAIL_MAILER
        value: log

  # ===========================================================
  # FRONTEND - React + Vite (Static Site - SEMPRE GRATIS)
  # ===========================================================
  - type: web
    name: gefther-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # ALTERAR apos o primeiro deploy do backend
      - key: VITE_API_URL
        value: https://gefther-backend.onrender.com

# ===========================================================
# BANCO DE DADOS - PostgreSQL gerenciado
# Gratis por 90 dias
# ===========================================================
databases:
  - name: gefther-db
    plan: free
    databaseName: gefther
    user: gefther
