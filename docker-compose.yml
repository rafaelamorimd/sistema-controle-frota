services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gefther_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gefther}
      DB_USERNAME: ${DB_USERNAME:-gefther}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gefther

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gefther_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - gefther

  postgres:
    image: postgres:16-alpine
    container_name: gefther_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-gefther}
      POSTGRES_USER: ${DB_USERNAME:-gefther}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gefther}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gefther

  redis:
    image: redis:7-alpine
    container_name: gefther_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gefther

volumes:
  pgdata:
  redisdata:

networks:
  gefther:
    driver: bridge
